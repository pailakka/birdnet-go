name: Build dev container images

# Add concurrency configuration to handle multiple pushes
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    # Runs at 02:00 UTC every day
    - cron: "0 2 * * *"
  pull_request:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/**"
      - "**.md"
  workflow_dispatch:
  push:
    paths-ignore:
      - ".github/workflows/**"
      - "**.md"
    branches:
      # Only run on push to main branch
      - main

permissions:
  contents: read
  packages: write

jobs:
  # Lint is handled by golangci-test.yml workflow - no need to duplicate here
  build-and-push-docker-image:
    if: |
      (github.event_name == 'push' && github.ref_name == 'main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}
          BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')
          echo "BRANCH_TAG=${BRANCH_TAG}" >> ${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate tags
        run: |
          TAGS="ghcr.io/${REPO}:${GITHUB_SHA}"
          TAGS="${TAGS}"$'\n'"ghcr.io/${REPO}:podman-${GITHUB_SHA}"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS="${TAGS}"$'\n'"ghcr.io/${REPO}:dev"
            TAGS="${TAGS}"$'\n'"ghcr.io/${REPO}:podman-dev"
          else
            TAGS="${TAGS}"$'\n'"ghcr.io/${REPO}:branch-${BRANCH_TAG}"
            TAGS="${TAGS}"$'\n'"ghcr.io/${REPO}:podman-branch-${BRANCH_TAG}"
          fi

          {
            echo "TAGS<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Build and push container images
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # Tags for both Docker and Podman users
          # Standard tags for Docker users
          # Podman-prefixed tags for easier discovery by Podman users
          # Same OCI image, just different tags for user convenience
          tags: ${{ env.TAGS }}
          platforms: linux/arm64, linux/amd64
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ env.REPO }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/${{ env.REPO }}:buildcache,mode=max
          provenance: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1
